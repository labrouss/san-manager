# =============================================================================
# buildroot/board/san-platform/genimage.cfg
#
# Disk image layout — GPT, EFI-only boot (no legacy BIOS partition).
#
#   Part 1  FAT32  256 MiB   EFI System Partition  (GRUB2 EFI bootloader)
#   Part 2  ext4   3072 MiB  root filesystem
#   Part 3  ext4   4096 MiB  /var/lib/san-platform  (data: pg_data + logs)
#
# genimage is called by post-image.sh after Buildroot finishes building.
# The files referenced here (efi-part.vfat, rootfs.ext4) are produced by
# Buildroot's GRUB2 and rootfs-ext4 targets respectively.
# =============================================================================

image efi-part.vfat {
    vfat {
        label = "EFI"
        files = {
            "EFI"
        }
    }
    size = 256M
}

image rootfs.ext4 {
    ext4 {}
    # size is controlled by BR2_TARGET_ROOTFS_EXT2_SIZE in the defconfig
}

image data.ext4 {
    ext4 {
        label = "san-data"
    }
    size = 4096M
}

image disk.img {
    hdimage {
        gpt = true
    }

    partition efi {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = true
        image = "efi-part.vfat"
    }

    partition rootfs {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext4"
    }

    partition data {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "data.ext4"
    }
}
