# =============================================================================
# SAN Platform GRUB2 EFI Boot Configuration
# =============================================================================

set default=0
set timeout=5

# ── Load drivers available in the standalone EFI binary ──────────────────────
insmod part_gpt
insmod ext2
insmod all_video
insmod font
insmod gfxterm
insmod serial

# ── Serial console: COM1 = ttyS0, 115200 8N1 ─────────────────────────────────
serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1

# ── Output to both VGA (UEFI framebuffer) and serial ─────────────────────────
# Use text terminal — gfxterm requires a font file that may not be embedded.
# If you see the GRUB menu on screen, gfxterm worked; if not, serial is there.
if loadfont unicode; then
    set gfxmode=auto
    terminal_output gfxterm
    terminal_output --append serial
    terminal_input  serial
    terminal_input  --append console
else
    # Fallback: plain text terminal on both VGA and serial
    terminal_output console
    terminal_output --append serial
    terminal_input  console
    terminal_input  --append serial
fi

# ── Boot entry ────────────────────────────────────────────────────────────────
menuentry "SAN Platform" {
    insmod part_gpt
    insmod ext2

    set root=(hd0,gpt2)

    # bzImage = the Buildroot kernel filename (NOT vmlinuz)
    # console= order matters: last listed is the "primary" console.
    # We put ttyS0 last so kernel messages go to serial + VGA simultaneously.
    # earlyprintk sends messages before the full console driver loads.
    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=tty0 \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=7 \
        panic=10

    boot
}

menuentry "SAN Platform (serial only, safe mode)" {
    insmod part_gpt
    insmod ext2

    set root=(hd0,gpt2)

    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=7 \
        panic=10 \
        nomodeset \
        3

    boot
}
