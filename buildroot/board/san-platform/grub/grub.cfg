# =============================================================================
# buildroot/board/san-platform/grub/grub.cfg
#
# GRUB2 EFI configuration for the SAN Platform appliance.
#
# Boot layout:
#   GPT Partition 1 (EFI, FAT32) — contains this grub.cfg + bootx64.efi
#   GPT Partition 2 (ext4)       — root filesystem containing /boot/bzImage
#
# GRUB EFI loads this file from the EFI partition, then uses linux to
# load the kernel from the root partition (hd0,gpt2).
#
# The kernel command line:
#   root=/dev/sda2    — root partition (sda = first SCSI/SATA/virtio disk)
#   rootwait          — wait for disk to be ready (important in VMs)
#   rootfstype=ext4
#   console=tty1      — show boot messages on the VM's display
#   console=ttyS0     — also output to serial (accessible via VMware console)
#   quiet             — suppress verbose kernel messages after boot
# =============================================================================

set default=0
set timeout=3
set timeout_style=menu

# Load EFI video support
insmod all_video
insmod gfxterm

# Try to set a graphical terminal; fall back to console silently
if loadfont unicode; then
    terminal_output gfxterm
fi

menuentry "SAN Platform" {
    insmod part_gpt
    insmod ext2

    # Root partition is GPT partition 2 on the first disk
    set root=(hd0,gpt2)

    # Load kernel from /boot on the root ext4 partition
    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        console=tty1 \
        console=ttyS0,115200 \
        quiet \
        systemd.unified_cgroup_hierarchy=1

    # No initrd — Buildroot builds a monolithic kernel with all drivers built in
    boot
}

menuentry "SAN Platform (verbose)" {
    insmod part_gpt
    insmod ext2
    set root=(hd0,gpt2)
    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        console=tty1 \
        console=ttyS0,115200
    boot
}
