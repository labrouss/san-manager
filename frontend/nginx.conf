# =============================================================================
# frontend/nginx.conf
# Hardened nginx config for the React SPA container.
# Port 8080 (non-root). Proxies /api/* → backend service on port 3001.
# =============================================================================

server {
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Permissions-Policy        "geolocation=()"        always;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    image/svg+xml;

    # ── API proxy → backend container ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts for long-running NX-API calls
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Don't buffer — stream responses
        proxy_buffering off;
    }

    # ── Health endpoint (for load-balancer / orchestrator) ──────────────────
    location /healthz {
        access_log  off;
        return 200  "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── Static asset caching ────────────────────────────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── SPA fallback — all unknown paths serve index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Disable access to dotfiles ───────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
