# =============================================================================
# .github/workflows/ci.yml
#
# Fast CI checks on every push / PR — runs in minutes, not hours.
#
# Checks:
#   1. Lint & type-check backend (tsc --noEmit)
#   2. Lint & type-check frontend (tsc --noEmit)
#   3. Backend unit tests (vitest)
#   4. Docker build validation (build without pushing)
#   5. docker compose config lint
#   6. Shell script lint (shellcheck on all *.sh files)
#
# The full OVA build only runs in build-ova.yml on main/release/tags.
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "buildroot/**"
      - "scripts/**"
      - ".github/workflows/build-ova.yml"
  pull_request:
    branches: [main, "release/**"]

# Opt into Node.js 24 for all actions (avoids Node 20 deprecation warnings).
# Remove once actions/checkout@v4, actions/setup-node@v4, etc. ship native
# Node 24 support and this flag becomes the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # Lint & type-check
  # ===========================================================================
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: TypeScript check — backend
        run: cd backend && npx tsc --noEmit

      - name: TypeScript check — frontend
        run: cd frontend && npx tsc --noEmit

  # ===========================================================================
  # Backend unit tests
  # ===========================================================================
  test-backend:
    name: "Backend Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: cd backend && npm ci

      - name: Run vitest
        run: cd backend && npx vitest run tests/

  # ===========================================================================
  # Docker build validation
  # ===========================================================================
  docker-build:
    name: "Docker Build Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-ci-${{ runner.os }}-${{ hashFiles('backend/Dockerfile', 'frontend/Dockerfile') }}
          restore-keys: buildx-ci-${{ runner.os }}-

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: san-platform/backend:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: san-platform/frontend:ci
          build-args: VITE_API_URL=/api
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Validate docker compose config
        run: |
          # Provide placeholder secrets so compose config can parse
          mkdir -p secrets
          echo "test" > secrets/db_password.txt
          echo "test" > secrets/mds_password.txt
          docker compose config --quiet

  # ===========================================================================
  # Shell script lint
  # ===========================================================================
  shellcheck:
    name: "ShellCheck"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all shell scripts
        run: |
          find . \( -name "*.sh" -o -name "docker-entrypoint.sh" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            -print0 \
          | xargs -0 shellcheck --severity=warning

